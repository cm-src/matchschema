name: Update Schedule

on:
  schedule:
    # 05:00 and 17:00 UTC = 06:00 and 18:00 CET (Stockholm winter time)
    - cron: '0 5,17 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'generator/**'
      - '.github/workflows/update-schedule.yml'

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        # v5 — https://github.com/actions/checkout/releases/tag/v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Python
        # v5 — https://github.com/actions/setup-python/releases/tag/v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'

      - name: Install uv
        # v5.4.2 — https://github.com/astral-sh/setup-uv/releases/tag/v5
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Install dependencies
        working-directory: generator
        run: uv sync

      - name: Generate schedule
        working-directory: generator
        run: uv run app.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update schedule $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi