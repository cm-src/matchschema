name: Update Schedule

on:
  schedule:
    # 05:00 and 17:00 UTC = 06:00 and 18:00 CET (Stockholm winter time)
    - cron: '0 5,17 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'generator/**'
      - '.github/workflows/update-schedule.yml'

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        # v6.0.2 — https://github.com/actions/checkout/releases/tag/v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        # v6.2.0 — https://github.com/actions/setup-python/releases/tag/v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install uv
        # v8.1.0 — https://github.com/astral-sh/setup-uv/releases/tag/v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install dependencies
        working-directory: generator
        run: uv sync

      - name: Generate schedule
        working-directory: generator
        run: uv run app.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update schedule $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi