# Central F10 Schedule Configuration
# ================================
# Each entry represents one team's calendar from Profixio.
# URLs can be found in Profixio → Team → Calendar → Subscribe (ICS)
#
# Note: Profixio URLs contain signatures that may expire.
# If downloads fail with 403, refresh URLs from Profixio UI.
#
# Team Colors:
#   #550f38 - Club burgundy (Vinröd)
#   #fec225 - Club gold (Gul)
#   #00072e - SBBF blue
#   #000000 - Black
#   #ffffff - White

# Field Reference:
# ----------------
# url          - Profixio ICS calendar URL (required)
#               Found in Profixio → Team → Calendar → Subscribe
#
# filename     - Local cache filename (required)
#               Must end with .ics, used for caching downloaded data
#
# team_name    - Full team name (required)
#               Displayed in calendar exports and TSV, e.g. "Central F10 Vinröd"
#
# team_slug    - URL-safe identifier (required)
#               Used for filtering in the web UI, must be unique, e.g. "f10vinrod"
#
# team_display - Short display name (required)
#               Shown on team badges in the web UI, e.g. "Vinröd"
#
# team_color   - Hex color for UI elements (required)
#               Used for team strips, badges, and filter chips, e.g. "#550f38"
#
# division     - Division/league name (optional)
#               For documentation purposes only

