<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central F10/F11 – Matchschema</title>

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">

  <!-- PWA -->
  <link rel="manifest" href="./assets/manifest.json">
  <meta name="theme-color" content="#550f38">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Central F10/F11">

  <meta name="description" content="Matchschema för Central F10/F11 – Se basketmatcher, tider och platser för flickor födda 2010 och 2011.">

  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self';">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <div class="header-left">
        <img src="./assets/apple-touch-icon.png" alt="Central F10/F11" class="logo" width="48" height="48">
        <h1 class="header-title">Central F10/F11</h1>
      </div>
      <div class="header-right">
        <button class="btn-theme-toggle" id="themeToggle" aria-label="Växla tema">
          <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <a href="https://www.youtube.com/@CentralBasketF10-t2w/streams" target="_blank" rel="noopener noreferrer" class="btn-streams" aria-label="Se streams på YouTube">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
          <span>Se streams</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Filter Section -->
  <section class="filter-section">
    <div class="filter-container">
      <div class="filter-left">
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="searchInput" placeholder="Sök lag, motstånd, hall..." class="search-input">
        </div>
        <div class="filter-chips" id="filterChips">
          <!-- Populated dynamically from games.json -->
        </div>
      </div>
      <div class="filter-right">
        <div class="date-segmented">
          <button class="segment segment-active" data-date="upcoming">Kommande</button>
          <button class="segment" data-date="all">Alla</button>
        </div>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-container">
      <div class="section-header">
        <h2 class="section-title">Matchschema</h2>
        <span class="match-count" id="matchCount">Laddar...</span>
      </div>

      <!-- Games Container (populated by JavaScript) -->
      <div class="games-container" id="gamesContainer">
        <!-- Games loaded dynamically from data/games.json -->
      </div>

      <!-- Table Toggle -->
      <div class="table-toggle">
        <button class="btn-table-toggle" id="tableToggle">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="12" y1="3" x2="12" y2="21"></line></svg>
          Visa tabell
          <svg class="btn-icon chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
      </div>

      <!-- Table View -->
      <div class="table-section" id="tableSection">
        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Lag</th>
                <th>Match</th>
                <th>Plats</th>
                <th>Tid</th>
                <th>Länk</th>
              </tr>
            </thead>
            <tbody>
              <!-- Populated by JavaScript -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Empty State (hidden by default) -->
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </div>
        <h3 class="empty-title">Inga matcher hittades</h3>
        <p class="empty-description">Prova att ändra dina filter eller sökord</p>
        <button class="btn-clear" id="clearFilters">Rensa filter</button>
      </div>

      <!-- Downloads Section -->
      <div class="downloads-section">
        <h3 class="downloads-title" id="downloadsTitle">Ladda ner alla matcher</h3>
        <div class="downloads-links">
          <button class="download-link" id="downloadTsv" type="button">
            <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Excel/TSV
          </button>
          <button class="download-link" id="downloadIcs" type="button">
            <svg class="download-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Kalender (ICS)
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-container">
      <div class="footer-top">
        <div class="footer-left">      
          <span class="footer-title"></span>
        </div>
        <div class="footer-social">
          <a href="https://www.instagram.com/centralbasketf10_11/" target="_blank" rel="noopener noreferrer" class="btn-social" aria-label="Instagram">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
          </a>
          <a href="https://www.youtube.com/@CentralBasketF10-t2w/streams" target="_blank" rel="noopener noreferrer" class="btn-streams-footer" aria-label="Se streams på YouTube">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <span>Se streams</span>
          </a>
        </div>
      </div>
      <div class="footer-divider"></div>
      <div class="footer-bottom">
        <p class="footer-copy">© 2026 C. Mathlin - MIT License</p>
      </div>
    </div>
  </footer>

  <script src="./assets/app.js"></script>
  <script>
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => {
            console.log('SW registered:', reg.scope);
            // Check for updates every 5 minutes
            setInterval(() => {
              reg.update().then(() => console.log('SW update check completed'));
            }, 5 * 60 * 1000);
          })
          .catch((err) => console.log('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
